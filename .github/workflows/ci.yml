# CI Pipeline for vn-nlp
#
# Flow:
#   1. Push/PR to dev or main → runs tests, fmt, docs, audit, coverage
#   2. To release: run "Version Bump" workflow on main (Actions → Version Bump → Run)
#      - Auto bumps version: 0.1.x patch (0.1.9 → 0.2.0 auto-promote)
#      - Creates git tag → triggers release.yml → publishes to crates.io
#   3. Release workflow only accepts tags from main branch
#
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  test:
    name: Test (${{ matrix.rust }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.83.0"]  # MSRV = 1.83.0
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
          - rust: beta
            os: macos-latest
          - rust: beta
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --workspace --all-features --exclude vn-nlp-python
      - name: Build
        if: matrix.os != 'macos-latest'
        run: cargo build --all --all-features
      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --all-features --exclude vn-nlp-python
      - name: Test
        if: matrix.os != 'macos-latest'
        run: cargo test --all --all-features
      - name: Doc tests (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo test --doc --workspace --exclude vn-nlp-python
      - name: Doc tests
        if: matrix.os != 'macos-latest'
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --exclude vn-nlp-python --out Xml --output-dir coverage/
      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/cobertura.xml
