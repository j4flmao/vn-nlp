# CI Pipeline for vn-nlp
#
# Flow:
#   1. Push/PR to dev or main → runs tests, fmt, docs, audit, coverage
#   2. To release: run "Version Bump" workflow on main (Actions → Version Bump → Run)
#      - Auto bumps version: 0.1.x patch (0.1.9 → 0.2.0 auto-promote)
#      - Creates git tag → triggers release.yml → publishes to crates.io
#   3. Release workflow only accepts tags from main branch
#
name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  test:
    name: Test (${{ matrix.rust }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.83.0"]  # MSRV = 1.83.0
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
          - rust: beta
            os: macos-latest
          - rust: beta
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --workspace --all-features --exclude vn-nlp-python
      - name: Build
        if: matrix.os != 'macos-latest'
        run: cargo build --all --all-features
      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --all-features --exclude vn-nlp-python
      - name: Test
        if: matrix.os != 'macos-latest'
        run: cargo test --all --all-features
      - name: Doc tests (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo test --doc --workspace --exclude vn-nlp-python
      - name: Doc tests
        if: matrix.os != 'macos-latest'
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --exclude vn-nlp-python --out Xml --output-dir coverage/
      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/cobertura.xml

  # Release pipeline: chỉ chạy khi push tag v*.*.*
  check-branch:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          if ! git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "❌ Tag must be on main branch!"
            echo "Create tag from main: git checkout main && git tag vX.Y.Z"
            exit 1
          fi
          echo "✅ Tag is on main branch"

  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    needs:
      - check-branch
      - test
      - fmt
      - docs
      - audit
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check docs build (release)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Check version matches tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="vn-nlp") | .version')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "❌ Tag v$TAG != Cargo.toml version $CARGO_VERSION"
            echo "Fix: update version in Cargo.toml to $TAG"
            exit 1
          fi
          echo "✅ Version matches: $TAG"

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    environment: CARGO_REGISTRY_TOKEN
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish vn-nlp-core
        run: cargo publish -p vn-nlp-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish vn-nlp-tokenize
        run: cargo publish -p vn-nlp-tokenize --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vn-nlp-normalize
        run: cargo publish -p vn-nlp-normalize --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vn-nlp-segment
        run: cargo publish -p vn-nlp-segment --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish vn-nlp (facade)
        run: cargo publish -p vn-nlp --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
